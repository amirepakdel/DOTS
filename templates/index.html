<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app">
        <header>
            <h1>🤖 AI Agent</h1>
            <span class="badge">gpt-4o-mini</span>
            <button id="clearBtn" class="btn-secondary">Clear Chat</button>
        </header>

        <div id="chatBox" class="chat-box">
            <div class="message assistant">
                <div class="bubble">Hello! I'm your AI assistant. Ask me anything.</div>
            </div>
        </div>

        <div class="input-area">
            <textarea id="userInput" placeholder="Type your message..." rows="1"></textarea>
            <button id="sendBtn" class="btn-primary">Send</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
