version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: dtos-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    command: >
      postgres 
      -c shared_buffers=512MB 
      -c effective_cache_size=1536MB 
      -c work_mem=64MB 
      -c maintenance_work_mem=256MB
      -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dtos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --tcp-keepalive 60
      --timeout 0
    sysctls:
      - net.core.somaxconn=65535
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  django:
    build: .
    container_name: dtos-django
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-change-me-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=chatdb
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DEBUG=${DEBUG:-False}
      - STATIC_ROOT=/var/www/static
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - static_volume:/var/www/static
    restart: unless-stopped

  nginx:
    build: ./nginx
    container_name: dtos-nginx
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CERTBOT_DOMAIN=su.forclosure.ai
      - CERTBOT_EMAIL=${CERTBOT_EMAIL:-}
      - CERTBOT_STAGING=${CERTBOT_STAGING:-0}
    volumes:
      - static_volume:/var/www/static:ro
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - django
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  certbot_data:
  certbot_www:
  redis_data: